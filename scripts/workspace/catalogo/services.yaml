# Catálogo de Projetos - Attus
# Usado pelos scripts em scripts/git/ para clone, sync e gestão
#
# Estrutura:
#   groups[].directories[].base_url + services[].name → URL do repo (.git)
#   groups[].services[] → projetos na raiz do grupo (com campo 'repo' explícito)
#
# Os projetos são clonados em: projetos/{group}/{directory}/{name}

groups:

  # ─── Grupo Attornatus ───────────────────────────────────────────────
  - name: attornatus
    directories:
      - path: microsservicos
        base_url: https://git.eloware.com.br/attornatus/microservicos
        services:
          - name: admin
          - name: agendador
          - name: atena
          - name: attus-genai
            stack: python
          - name: attus-ml
            stack: python
          - name: auditoria
          - name: calculo
          - name: ces
          - name: cobranca
          - name: comunicacao
          - name: conversordoc
          - name: core
          - name: demanda
          - name: distribuicao
          - name: divida
          - name: documento
          - name: downdoc
          - name: fracionador
          - name: frontng
            stack: angular
            description: Frontend em Angular
          - name: integracao
          - name: integradoc
          - name: integraecarta
          - name: integrajud
          - name: integrareceita
          - name: integrareqjud
          - name: pessoa
          - name: processo
          - name: protesto
          - name: publicacao
          - name: requisitorio
          - name: security
          - name: sms
          - name: updoc

  # ─── Grupo Attus ────────────────────────────────────────────────────
  - name: attus

    # Projetos na raiz (fora de diretórios)
    services:
      - name: scripts
        repo: https://git.eloware.com.br/attus/scripts.git

    directories:
      - path: microsservicos
        base_url: https://git.eloware.com.br/attus/microservicos
        services:
          - name: debito
          - name: integrasda
          - name: kitajuizamento
          - name: parcelamento
          - name: sda

      - path: bibliotecas
        base_url: https://git.eloware.com.br/attus/bibliotecas
        services:
          - name: attus-conversor
          - name: attus-platform-bom
          - name: lib-action
          - name: lib-assinatura
          - name: lib-calculo
          - name: lib-conta
          - name: lib-conversao
          - name: lib-integracao
          - name: lib-search
          - name: lib-storage
          - name: lib-uso

      - path: bibliotecas/core
        base_url: https://git.eloware.com.br/attus/bibliotecas/core
        services:
          - name: lib-actionStrategy
          - name: lib-auditoria
          - name: lib-cache
          - name: lib-core
          - name: lib-database
          - name: lib-messageria
          - name: lib-parametro
          - name: lib-security
          - name: lib-starter
          - name: lib-test
          - name: lib-utils
